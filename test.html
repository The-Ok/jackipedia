<!DOCTYPE html>
<html>
    <head>
        <title>Jackipedia</title>
        <!-- 8443366655.4328 -->
        <link rel="icon" type="image/png" href="articles/Logo.png">

        <style>
            body {
                font-family: Arial, sans-serif;
            }

            #searchBar {
                padding: 8px;
                width: 250px;
                font-size: 16px;
                margin-bottom: 10px;
            }

            .article {
                display: block;
                margin: 5px 0;
            }
        </style>
    </head>

    <body>
        <img src="articles/Logo.png">
        <p>
            Welcome to Jackipedia, The ultimate encyclopedia for anything 
            <a href="https://www.youtube.com/@JackSucksAtLife">JackSucksAtLife</a> related
        </p>

        <br><br>

        <!-- SEARCH BAR -->
        <input 
            type="text" 
            id="searchBar" 
            placeholder="Search articles..." 
            onkeyup="searchArticles()"
        >

        <h3>Articles</h3>

        <div id="articlesList">
            <a class="article" href="articles/jacksucksatlife.html">JackSucksAtLife</a>
            <a class="article" href="articles/jacksucksatstuff.html">JackSucksAtStuff</a>
            <a class="article" href="articles/jacksucksatgeography.html">JackSucksAtGeography</a>
            <a class="article" href="articles/jackmasseywelsh.html">Jack Massey Welsh</a>
            <a class="article" href="articles/jackmw.html">JackMW</a>
        </div>

        <br><br><br>

        <p>ver. like 0</p>
        <p>made by <a href="https://www.reddit.com/u/theok8234">u/theok8234</a></p>

        <script>
            function searchArticles() {
                let input = document.getElementById("searchBar").value.toLowerCase();
                let articles = document.getElementsByClassName("article");

                for (let i = 0; i < articles.length; i++) {
                    let text = articles[i].textContent.toLowerCase();

                    if (text.includes(input)) {
                        articles[i].style.display = "block";
                    } else {
                        articles[i].style.display = "none";
                    }
                }
            }
        </script>
    </body>
</html>
