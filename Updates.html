<!DOCTYPE html>
<html>
<head>
    <title>Jackipedia</title>
    <link rel="icon" type="image/png" href="articles/Logo.png">
    <style>
        body {
            margin: 0;
            font-family: "Linux Libertine", "Georgia", "Times New Roman", serif;
            background-color: #f8f9fa;
        }

        /* Top bar */
        .topbar {
            background-color: white;
            border-bottom: 1px solid #a2a9b1;
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 50px;
            margin-right: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: normal;
        }

        /* Layout */
        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            border-right: 1px solid #a2a9b1;
            padding: 15px;
            font-size: 14px;
        }

        .sidebar a {
            display: block;
            color: #0645ad;
            text-decoration: none;
            margin: 5px 0;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        /* Main content */
        .content {
            flex: 1;
            padding: 20px;
            background-color: white;
        }

        h1 {
            font-size: 28px;
            border-bottom: 1px solid #a2a9b1;
            font-weight: normal;
        }

        h2 {
            border-bottom: 1px solid #a2a9b1;
            font-weight: normal;
        }

        a {
            color: #0645ad;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <img src="articles/Logo.png" onclick="window.location.href='https://the-ok.github.io/jackipedia/'" class="logo">
        <div class="title">Jackipedia</div>
    </div>

    <div class="container">

        <div class="content">

            <h1>Jackipedia</h1>
            <p>Update log</p>

            <h2>Updates</h2>
            <ul>
                <li>4/17/26: Date errors in update log fixed</li>
                <li>4/14/26: Update log and article list added</li>
                <li>4/13/26: Main page ultra-revamp</li>
            </ul>

        </div>

    </div>

</body>
</html>
