<!DOCTYPE html>
<html>
<head>
    <title>Jackipedia</title>
    <link rel="icon" type="image/png" href="articles/Logo.png">
    <style>
        body {
            margin: 0;
            font-family: "Linux Libertine", "Georgia", "Times New Roman", serif;
            background-color: #f8f9fa;
        }

        /* Top bar */
        .topbar {
            background-color: white;
            border-bottom: 1px solid #a2a9b1;
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 50px;
            margin-right: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: normal;
        }

        /* Layout */
        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            border-right: 1px solid #a2a9b1;
            padding: 15px;
            font-size: 14px;
        }

        .sidebar a {
            display: block;
            color: #0645ad;
            text-decoration: none;
            margin: 5px 0;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        /* Main content */
        .content {
            flex: 1;
            padding: 20px;
            background-color: white;
        }

        h1 {
            font-size: 28px;
            border-bottom: 1px solid #a2a9b1;
            font-weight: normal;
        }

        h2 {
            border-bottom: 1px solid #a2a9b1;
            font-weight: normal;
        }

        a {
            color: #0645ad;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <img src="articles/Logo.png" onclick="window.location.href='https://the-ok.github.io/jackipedia/'" class="logo">
        <div class="title">Jackipedia</div>
    </div>

    <div class="container">

        <div class="content">

            <h1>Jackipedia</h1>
            <p>Weekly Shoutout #2</p>

            <img width="15%" src="https://styles.redditmedia.com/t5_aj7g9s/styles/profileIcon_xd0iim8al1ag1.jpeg?frame=1&auto=webp&crop=256%3A256%2Csmart&s=f1ae46f6508d4f35d2a83711ad6b28e2699bc814">

</body>
</html>
