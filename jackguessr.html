<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JackGuessr</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#111;
    color: white;
}

#streetview{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
}

#topbar{
    position:fixed;
    top:15px;
    left:15px;
    z-index:1000;

    background:rgba(0,0,0,.75);
    color:white;

    padding:12px 18px;
    border-radius:12px;
}

#mapContainer{
    position:fixed;
    bottom:20px;
    right:20px;

    width:320px;
    height:220px;

    border-radius:12px;
    overflow:hidden;

    box-shadow:0 0 25px rgba(0,0,0,.5);

    z-index:1000;
}

#mapContainer:hover{
     width:420px;
    height:320px; 
}

#map{
    width:100%;
    height:100%;
}

#submit{
    position:fixed;
    bottom:250px;
    right:20px;

    padding:12px 24px;
    font-size:18px;

    border:none;
    border-radius:10px;

    background:#00b95d;
    color:white;

    cursor:pointer;
    z-index:1000;
}

#next{
    position:fixed;
    bottom:250px;
    right:150px;

    padding:12px 24px;
    font-size:18px;

    border:none;
    border-radius:10px;

    background:#2979ff;
    color:white;

    cursor:pointer;
    display:none;
    z-index:1000;
}

#results{
    position:fixed;
    top:100px;
    left:15px;

    background:rgba(0,0,0,.8);
    color:white;

    padding:15px;
    border-radius:12px;

    z-index:1000;
    display:none;
}

button:hover{
    opacity:.9;
}

a{
    color: rgb(0, 157, 255);
}

</style>
</head>

<body>

<div hidden id="topbar">
    <h2>JackGuessr</h2>
    Round: <span id="round">1</span><br>
    Score: <span id="score">0</span>
</div>

<h1>Jackguessr</h1>
<h3 id="country">edition</h3>
<h3>Hosted on Jackipedia</h3>
<h3>Version 0.5-ish public beta</h3>
<h3>Made by theok8234</h3>
<h3><a href="https://www.reddit.com/u/theok8234">     On Reddit</a></h3>
<h3><a href="https://github.com/The-Ok">     On Github</a></h3>
<h3><a href="000001.html">     View official trailer</a></h3>

<button id="submit" onclick="playee()">Play</button>

 <script>
    function playee() {
        location.href = "play.html";
    }

    
    const countries = [
      "United States", "Canada", "Mexico", "Brazil", "Argentina",
      "United Kingdom", "France", "Germany", "Italy", "Spain",
      "Netherlands", "Sweden", "Norway", "Finland", "Poland",
      "Turkey", "Egypt", "Nigeria", "South Africa", "Kenya",
      "India", "Pakistan", "Bangladesh", "China", "Japan",
      "South Korea", "Thailand", "Vietnam", "Indonesia", "Philippines",
      "Australia", "New Zealand", "Saudi Arabia", "United Arab Emirates", "Israel"
    ];

    const randomCountry = countries[Math.floor(Math.random() * countries.length)];
    document.getElementById("country").textContent = randomCountry + " Edition";
 </script>

</body>
</html>
